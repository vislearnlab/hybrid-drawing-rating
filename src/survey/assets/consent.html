<div style="width:100%; max-width:700px; margin:0 auto; padding:20px; font-family:sans-serif; box-sizing:border-box;">
  <img id="consentPage1" style="width:100%; display:block; margin-bottom:12px;">
  <img id="consentPage2" style="width:100%; display:block; margin-bottom:12px;">
  <img id="consentPage3" style="width:100%; display:block; margin-bottom:12px;">
  <img id="consentPage4" style="width:100%; display:block; margin-bottom:24px;">

  <p>
    <input type="checkbox" id="consent_checkbox">
    <label for="consent_checkbox">
      I have read the above information and agree to participate.
    </label>
  </p>

  <p id="error" style="display:none; color:#c0392b; font-weight:bold;">
    You must agree to participate before continuing.
  </p>

  <button id="start" class="jspsych-btn">Begin Study</button>

  <script>
    const base = new URL(window.location.href).origin +
                 new URL(window.location.href).pathname.replace(/\/+$/, '');
    document.getElementById('consentPage1').src = base + '/assets/consentPage1.png';
    document.getElementById('consentPage2').src = base + '/assets/consentPage2.png';
    document.getElementById('consentPage3').src = base + '/assets/consentPage3.png';
    document.getElementById('consentPage4').src = base + '/assets/consentPage4.png';
  </script>
</div>
